<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color: red; position: fixed; z-index: 9999; top: 0; left: 0; background: white; padding: 20px;">' + e.message + '<br/><pre>' + e.error.stack + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="color: red; position: fixed; z-index: 9999; top: 50%; left: 0; background: white; padding: 20px;">' + e.reason + '</div>';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
